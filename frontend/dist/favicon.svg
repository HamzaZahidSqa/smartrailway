<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Blue circle background -->
  <circle cx="32" cy="32" r="32" fill="#1e40af"/>
  <!-- Train body -->
  <rect x="9" y="24" width="46" height="20" rx="4" fill="#facc15"/>
  <!-- Front bumper -->
  <rect x="6" y="27" width="6" height="13" rx="2" fill="#facc15"/>
  <!-- Roof -->
  <rect x="12" y="18" width="37" height="8" rx="3" fill="#2563eb"/>
  <!-- Chimney -->
  <rect x="40" y="13" width="5" height="7" rx="2" fill="#2563eb"/>
  <!-- Windows -->
  <rect x="16" y="27" width="7" height="7" rx="1.5" fill="#1e40af"/>
  <rect x="27" y="27" width="7" height="7" rx="1.5" fill="#1e40af"/>
  <rect x="38" y="27" width="7" height="7" rx="1.5" fill="#1e40af"/>
  <!-- Wheels -->
  <circle cx="20" cy="46" r="5" fill="#1e40af" stroke="#facc15" stroke-width="2"/>
  <circle cx="20" cy="46" r="2" fill="#facc15"/>
  <circle cx="38" cy="46" r="5" fill="#1e40af" stroke="#facc15" stroke-width="2"/>
  <circle cx="38" cy="46" r="2" fill="#facc15"/>
  <!-- Headlight -->
  <circle cx="9" cy="32" r="2.5" fill="#fef08a"/>
</svg>
