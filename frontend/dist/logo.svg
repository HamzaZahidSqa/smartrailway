<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Blue circle background -->
  <circle cx="100" cy="100" r="95" fill="#1e40af" stroke="#facc15" stroke-width="4"/>
  <!-- Train body -->
  <rect x="30" y="80" width="140" height="55" rx="10" fill="#facc15" stroke="#1e40af" stroke-width="2"/>
  <!-- Front bumper -->
  <rect x="26" y="85" width="12" height="38" rx="4" fill="#facc15" stroke="#1e40af" stroke-width="2"/>
  <!-- Roof -->
  <rect x="40" y="65" width="110" height="18" rx="8" fill="#2563eb" stroke="#1e40af" stroke-width="2"/>
  <!-- Chimney -->
  <rect x="125" y="50" width="14" height="18" rx="4" fill="#2563eb" stroke="#1e40af" stroke-width="2"/>
  <!-- Windows -->
  <rect x="50" y="88" width="18" height="18" rx="4" fill="#1e40af"/>
  <rect x="76" y="88" width="18" height="18" rx="4" fill="#1e40af"/>
  <rect x="102" y="88" width="18" height="18" rx="4" fill="#1e40af"/>
  <rect x="128" y="88" width="18" height="18" rx="4" fill="#1e40af"/>
  <!-- Wheels -->
  <circle cx="65" cy="138" r="13" fill="#1e40af" stroke="#facc15" stroke-width="3"/>
  <circle cx="65" cy="138" r="5" fill="#facc15"/>
  <circle cx="120" cy="138" r="13" fill="#1e40af" stroke="#facc15" stroke-width="3"/>
  <circle cx="120" cy="138" r="5" fill="#facc15"/>
  <!-- Headlight -->
  <circle cx="33" cy="100" r="6" fill="#fef08a" stroke="#facc15" stroke-width="1.5"/>
  <!-- Track lines -->
  <line x1="20" y1="152" x2="180" y2="152" stroke="#facc15" stroke-width="3" stroke-linecap="round"/>
  <line x1="30" y1="158" x2="170" y2="158" stroke="#facc15" stroke-width="2" opacity="0.5"/>
  <!-- SR text -->
  <text x="163" y="48" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="22" fill="#facc15">SR</text>
</svg>
